<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; img-src 'self' data:; style-src 'self'; script-src 'self';" />
  <title>Chattering – Configuración</title>
  <link rel="stylesheet" href="settings.css" />
</head>
<body class="theme-dark">

  <!-- Titlebar -->
  <header id="settings-titlebar">
    <div id="settings-drag">
      <span class="settings-icon">⚙</span>
      <span>Configuración</span>
    </div>
    <button class="ctrl-btn danger" id="btn-close-settings">
      <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    </button>
  </header>

  <!-- Sidebar + content layout -->
  <div id="settings-layout">

    <nav id="settings-nav">
      <button class="nav-item active" data-section="appearance">Apariencia</button>
      <button class="nav-item" data-section="chat">Chat</button>
      <button class="nav-item" data-section="tts">TTS</button>
      <button class="nav-item" data-section="alerts">Alertas</button>
      <button class="nav-item" data-section="moderation">Moderación</button>
      <button class="nav-item" data-section="connections">Conexiones</button>
      <button class="nav-item" data-section="accessibility">Accesibilidad</button>
    </nav>

    <div id="settings-content">

      <!-- ── Appearance ──────────────────────────────────────────────────── -->
      <section class="settings-section active" id="sec-appearance">
        <h2>Apariencia</h2>

        <div class="setting-group">
          <label class="setting-label" for="sel-theme">Tema</label>
          <select class="setting-control" id="sel-theme" data-key="theme">
            <option value="dark">Oscuro</option>
            <option value="light">Claro</option>
          </select>
        </div>

        <div class="setting-group">
          <label class="setting-label">Modo Always On Top</label>
          <label class="toggle">
            <input type="checkbox" id="chk-alwaysontop" data-key="alwaysOnTop" />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </label>
        </div>

        <div class="setting-group">
          <label class="setting-label">Modo translúcido <span class="hint">(requiere reinicio)</span></label>
          <label class="toggle">
            <input type="checkbox" id="chk-translucent" data-key="translucent" />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </label>
        </div>

        <div class="setting-group">
          <label class="setting-label" for="rng-fontsize">Tamaño de fuente: <strong id="lbl-fontsize">13</strong>px</label>
          <input type="range" id="rng-fontsize" data-key="fontSize" min="10" max="22" step="1" value="13" />
        </div>

        <div class="setting-group">
          <label class="setting-label" for="rng-max-messages">Máx. mensajes en DOM: <strong id="lbl-max-messages">500</strong></label>
          <input type="range" id="rng-max-messages" data-key="maxMessages" min="100" max="2000" step="50" value="500" />
        </div>

        <div class="setting-group">
          <label class="setting-label">Mostrar timestamps</label>
          <label class="toggle">
            <input type="checkbox" id="chk-timestamps" data-key="showTimestamps" />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </label>
        </div>
      </section>

      <!-- ── Chat ────────────────────────────────────────────────────────── -->
      <section class="settings-section" id="sec-chat">
        <h2>Chat</h2>

        <div class="setting-group">
          <label class="setting-label" for="sel-filter-platform">Filtrar por plataforma</label>
          <select class="setting-control" id="sel-filter-platform" data-key="filterPlatform">
            <option value="all">Todas</option>
            <option value="twitch">Solo Twitch</option>
            <option value="tiktok">Solo TikTok</option>
            <option value="youtube">Solo YouTube</option>
          </select>
        </div>

        <div class="setting-group">
          <label class="setting-label" for="txt-bot-list">Lista de bots (separados por coma)</label>
          <input type="text" class="setting-input" id="txt-bot-list" data-key="botList"
            placeholder="Nightbot, Streamlabs, …" />
        </div>

        <div class="setting-group">
          <label class="setting-label">Mostrar emotes animados</label>
          <label class="toggle">
            <input type="checkbox" id="chk-animated" data-key="animatedEmotes" checked />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </label>
        </div>

        <div class="setting-group">
          <label class="setting-label">Resaltar menciones</label>
          <label class="toggle">
            <input type="checkbox" id="chk-highlight" data-key="highlightMentions" checked />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </label>
        </div>

        <div class="setting-group">
          <label class="setting-label" for="txt-highlight-words">Palabras a resaltar</label>
          <input type="text" class="setting-input" id="txt-highlight-words" data-key="highlightWords"
            placeholder="tu_usuario, keyword2, …" />
        </div>
      </section>

      <!-- ── TTS ─────────────────────────────────────────────────────────── -->
      <section class="settings-section" id="sec-tts">
        <h2>Texto a Voz (TTS)</h2>

        <div class="setting-group">
          <label class="setting-label">Activar TTS</label>
          <label class="toggle">
            <input type="checkbox" id="chk-tts" data-key="ttsEnabled" />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </label>
        </div>

        <div class="setting-group">
          <label class="setting-label">TTS solo Twitch</label>
          <label class="toggle">
            <input type="checkbox" id="chk-tts-twitch-only" data-key="ttsOnlyTwitch" />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </label>
        </div>

        <div class="setting-group">
          <label class="setting-label" for="rng-tts-rate">Velocidad: <strong id="lbl-tts-rate">1</strong></label>
          <input type="range" id="rng-tts-rate" data-key="ttsRate" min="0.5" max="2" step="0.1" value="1" />
        </div>

        <div class="setting-group">
          <label class="setting-label" for="rng-tts-volume">Volumen: <strong id="lbl-tts-volume">1</strong></label>
          <input type="range" id="rng-tts-volume" data-key="ttsVolume" min="0" max="1" step="0.05" value="1" />
        </div>

        <div class="setting-group">
          <label class="setting-label" for="rng-tts-pitch">Tono: <strong id="lbl-tts-pitch">1</strong></label>
          <input type="range" id="rng-tts-pitch" data-key="ttsPitch" min="0" max="2" step="0.1" value="1" />
        </div>
      </section>

      <!-- ── Alerts ──────────────────────────────────────────────────────── -->
      <section class="settings-section" id="sec-alerts">
        <h2>Alertas</h2>

        <div class="setting-group">
          <label class="setting-label">Activar alertas visuales</label>
          <label class="toggle">
            <input type="checkbox" id="chk-alerts" data-key="alertsEnabled" checked />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </label>
        </div>

        <div class="setting-group">
          <label class="setting-label">Alerta de follows</label>
          <label class="toggle">
            <input type="checkbox" id="chk-alert-follow" data-key="alertFollow" checked />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </label>
        </div>

        <div class="setting-group">
          <label class="setting-label">Alerta de subs/regalos</label>
          <label class="toggle">
            <input type="checkbox" id="chk-alert-sub" data-key="alertSub" checked />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </label>
        </div>

        <div class="setting-group">
          <label class="setting-label">Alerta de bits/donaciones</label>
          <label class="toggle">
            <input type="checkbox" id="chk-alert-bits" data-key="alertBits" checked />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </label>
        </div>

        <div class="setting-group">
          <label class="setting-label">Alerta de raids</label>
          <label class="toggle">
            <input type="checkbox" id="chk-alert-raid" data-key="alertRaid" checked />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </label>
        </div>
      </section>

      <!-- ── Moderation ─────────────────────────────────────────────────── -->
      <section class="settings-section" id="sec-moderation">
        <h2>Moderación</h2>

        <div class="setting-group">
          <label class="setting-label">Confirmación antes de banear</label>
          <label class="toggle">
            <input type="checkbox" id="chk-ban-confirm" data-key="banConfirm" checked />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </label>
        </div>

        <div class="setting-group">
          <label class="setting-label" for="txt-timeout-default">Timeout por defecto (segundos)</label>
          <input type="number" class="setting-input" id="txt-timeout-default"
            data-key="defaultTimeout" value="600" min="1" max="1209600" />
        </div>

        <div class="setting-group">
          <label class="setting-label">Resaltar mensajes moderados</label>
          <label class="toggle">
            <input type="checkbox" id="chk-mod-highlight" data-key="modHighlight" />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </label>
        </div>
      </section>

      <!-- ── Connections ─────────────────────────────────────────────────── -->
      <section class="settings-section" id="sec-connections">
        <h2>Conexiones</h2>

        <div class="setting-group">
          <label class="setting-label">Twitch Client ID (para API)</label>
          <input type="text" class="setting-input" id="txt-twitch-client-id"
            data-key="twitchClientId" placeholder="xxxxxxxxxxxxxxxxxx" autocomplete="off" />
        </div>

        <div class="setting-group">
          <label class="setting-label">Twitch OAuth Token</label>
          <input type="password" class="setting-input" id="txt-twitch-token"
            data-key="twitchToken" placeholder="oauth:xxxxxxxxxxxxxxxxxx" autocomplete="off" />
        </div>

        <div class="setting-group">
          <label class="setting-label" for="txt-twitch-channel">Canal de Twitch (defecto)</label>
          <input type="text" class="setting-input" id="txt-twitch-channel"
            data-key="twitchChannel" placeholder="tu_canal" />
        </div>

        <div class="setting-group separator"></div>

        <div class="setting-group">
          <label class="setting-label" for="txt-yt-channel">Canal de YouTube (defecto)</label>
          <input type="text" class="setting-input" id="txt-yt-channel"
            data-key="youtubeChannel" placeholder="@tucanal o ID" />
        </div>

        <div class="setting-group">
          <label class="setting-label" for="txt-tiktok-user">Usuario TikTok (defecto)</label>
          <input type="text" class="setting-input" id="txt-tiktok-user"
            data-key="tiktokUser" placeholder="@tuusuario" />
        </div>
      </section>

      <!-- ── Accessibility ──────────────────────────────────────────────── -->
      <section class="settings-section" id="sec-accessibility">
        <h2>Accesibilidad</h2>

        <div class="setting-group">
          <label class="setting-label">Reducir animaciones</label>
          <label class="toggle">
            <input type="checkbox" id="chk-reduce-motion" data-key="reduceMotion" />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </label>
        </div>

        <div class="setting-group">
          <label class="setting-label">Alto contraste</label>
          <label class="toggle">
            <input type="checkbox" id="chk-high-contrast" data-key="highContrast" />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </label>
        </div>

        <div class="setting-group">
          <label class="setting-label" for="rng-scroll-speed">Velocidad de scroll automático</label>
          <input type="range" id="rng-scroll-speed" data-key="scrollSpeed"
            min="1" max="5" step="1" value="3" />
        </div>
      </section>

    </div><!-- /settings-content -->
  </div><!-- /settings-layout -->

  <footer id="settings-footer">
    <span id="settings-saved-indicator"></span>
    <button id="btn-reset-settings" class="btn-danger">Restablecer por defecto</button>
  </footer>

  <script src="settings.js"></script>
</body>
</html>
