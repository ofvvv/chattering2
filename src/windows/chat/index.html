<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; img-src 'self' https: data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self' https://www.youtube.com https://www.youtube-nocookie.com;" />
  <title>Chattering</title>
  <link rel="stylesheet" href="chat.css" />
</head>
<body class="theme-dark">

  <!-- ── Titlebar ─────────────────────────────────────────────────────────── -->
  <header id="titlebar">
    <div id="titlebar-drag">
      <span id="app-logo">⬡</span>
      <span id="app-name">Chattering</span>
    </div>
    <div id="titlebar-controls">
      <button class="ctrl-btn" id="btn-settings" title="Configuración">
        <svg viewBox="0 0 24 24"><path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.92c.04-.34.07-.68.07-1.08s-.03-.74-.07-1.08l2.21-1.63c.2-.16.25-.46.12-.7l-2.1-3.63c-.13-.24-.4-.32-.65-.24l-2.6 1.03a7.71 7.71 0 0 0-1.85-1.08l-.4-2.77A.49.49 0 0 0 14 2h-4c-.24 0-.44.18-.48.42l-.4 2.77a7.71 7.71 0 0 0-1.85 1.08L4.67 5.24c-.25-.08-.52 0-.65.24L1.92 9.11c-.13.24-.08.54.12.7l2.21 1.63c-.04.34-.07.68-.07 1.08s.03.74.07 1.08L2.04 15.22c-.2.16-.25.46-.12.7l2.1 3.63c.13.24.4.32.65.24l2.6-1.03c.57.42 1.19.78 1.85 1.08l.4 2.77c.04.24.24.42.48.42h4c.24 0 .44-.18.48-.42l.4-2.77a7.71 7.71 0 0 0 1.85-1.08l2.6 1.03c.25.08.52 0 .65-.24l2.1-3.63c.13-.24.08-.54-.12-.7l-2.21-1.63z"/></svg>
      </button>
      <button class="ctrl-btn" id="btn-minimize" title="Minimizar">
        <svg viewBox="0 0 24 24"><path d="M20 14H4v-2h16v2z"/></svg>
      </button>
      <button class="ctrl-btn" id="btn-maximize" title="Maximizar">
        <svg viewBox="0 0 24 24"><path d="M4 4h16v16H4V4zm2 2v12h12V6H6z"/></svg>
      </button>
      <button class="ctrl-btn danger" id="btn-close" title="Cerrar">
        <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
  </header>

  <!-- ── Platform tabs & channel inputs ───────────────────────────────────── -->
  <nav id="platform-bar" class="hidden">
    <!-- Platform connection UI hidden - use Settings > Accounts instead -->

    <!-- Quick filters button -->
    <button id="btn-filters" title="Filtros">
      <svg viewBox="0 0 24 24"><path d="M10 18h4v-2h-4v2zM3 6v2h18V6zm3 7h12v-2H6v2z"/></svg>
    </button>

    <!-- Channel connect row - hidden now, use Settings > Accounts -->
    <div id="channel-connect-row" class="hidden">
      <div class="channel-input-group" id="connect-twitch">
        <button class="btn-twitch-oauth" id="btn-twitch-oauth" title="Iniciar sesión con Twitch">
          <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M11.64 5.93h1.43v4.28h-1.43m3.93-4.28H17v4.28h-1.43M7 2L3.43 5.57v12.86h4.28V22l3.58-3.57h2.85L20.57 12V2m-1.43 9.29l-2.85 2.85h-2.86l-2.5 2.5v-2.5H7.14V3.43h12z"/></svg>
          Login
        </button>
        <input type="text" id="input-twitch-channel" placeholder="canal de twitch" autocomplete="off" spellcheck="false" />
        <button class="btn-connect" data-platform="twitch">Conectar</button>
      </div>
      <div class="channel-input-group hidden" id="connect-tiktok">
        <button class="btn-tiktok-login" id="btn-tiktok-login">Iniciar sesión TikTok</button>
        <input type="text" id="input-tiktok-user" placeholder="@usuario" autocomplete="off" spellcheck="false" />
        <button class="btn-connect" data-platform="tiktok">Conectar</button>
      </div>
      <div class="channel-input-group hidden" id="connect-youtube">
        <input type="text" id="input-yt-handle" placeholder="@canal o ID de canal" autocomplete="off" spellcheck="false" />
        <button class="btn-connect" data-platform="youtube">Conectar</button>
      </div>
    </div>

    <!-- Filters dropdown -->
    <div id="filters-dropdown" class="hidden">
      <div class="filter-group">
        <label>Plataforma</label>
        <select id="filter-platform">
          <option value="all">Todas</option>
          <option value="twitch">Twitch</option>
          <option value="tiktok">TikTok</option>
          <option value="youtube">YouTube</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Tipo de mensaje</label>
        <select id="filter-type">
          <option value="all">Todos</option>
          <option value="chat">Solo mensajes</option>
          <option value="events">Solo eventos</option>
        </select>
      </div>
      <div class="filter-group">
        <label>
          <input type="checkbox" id="filter-subs" checked /> Solo subs
        </label>
      </div>
      <div class="filter-group">
        <label>
          <input type="checkbox" id="filter-mods" checked /> Mostrar mods
        </label>
      </div>
      <button id="btn-apply-filters" class="btn-connect">Aplicar</button>
    </div>
  </nav>

  <!-- Popup for no connections -->
  <div id="no-connections-popup" class="hidden">
    <div class="popup-content">
      <h3>Bienvenido a Chattering</h3>
      <p>Para comenzar, configura tus cuentas en Configuración.</p>
      <button id="btn-open-settings-from-popup" class="btn-connect">Abrir Configuración</button>
    </div>
  </div>

  <!-- ── Connection status bar ─────────────────────────────────────────────── -->
  <div id="status-bar">
    <div class="status-badge hidden" id="status-twitch" data-platform="twitch">
      <span class="status-dot"></span>
      <span class="status-label">Twitch: —</span>
    </div>
    <div class="status-badge hidden" id="status-tiktok" data-platform="tiktok">
      <span class="status-dot"></span>
      <span class="status-label">TikTok: —</span>
    </div>
    <div class="status-badge hidden" id="status-youtube" data-platform="youtube">
      <span class="status-dot"></span>
      <span class="status-label">YouTube: —</span>
    </div>
  </div>

  <!-- ── Main layout ───────────────────────────────────────────────────────── -->
  <main id="main-layout">

    <!-- Chat area -->
    <section id="chat-section">
      <div id="chat-viewport">
        <div id="chat-messages" role="log" aria-live="polite" aria-label="Mensajes del chat"></div>
      </div>
      <button id="btn-new-messages" class="hidden" aria-label="Nuevos mensajes">
        <svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
        Nuevos mensajes
      </button>
      <div id="chat-input-area">
        <input type="text" id="chat-input" placeholder="Escribe un mensaje en Twitch…" maxlength="500" autocomplete="off" spellcheck="false" />
        <button id="btn-send">
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
        </button>
      </div>
    </section>

    <!-- Events dock -->
    <aside id="events-dock" class="dock-top">
      <div id="dock-resize-handle"></div>
      <div id="dock-header">
        <span>Eventos</span>
        <div id="dock-controls">
          <button id="btn-dock-float" class="dock-btn" title="Separar como ventana">
            <svg viewBox="0 0 24 24"><path d="M19 4H5c-1.11 0-2 .9-2 2v12c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H5V8h14v10z"/></svg>
          </button>
          <button id="btn-dock-top" class="dock-btn" title="Mover arriba">
            <svg viewBox="0 0 24 24"><path d="M7 14l5-5 5 5z"/></svg>
          </button>
          <button id="btn-dock-left" class="dock-btn" title="Mover izquierda">
            <svg viewBox="0 0 24 24"><path d="M14 7l-5 5 5 5z"/></svg>
          </button>
          <button id="btn-dock-right" class="dock-btn" title="Mover derecha">
            <svg viewBox="0 0 24 24"><path d="M10 17l5-5-5-5z"/></svg>
          </button>
          <button id="btn-dock-bottom" class="dock-btn" title="Mover abajo">
            <svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
          </button>
          <button id="btn-clear-events" class="dock-btn dock-btn-subtle" title="Limpiar eventos">
            <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
          </button>
        </div>
      </div>
      <div id="dock-events" role="log" aria-live="polite"></div>
    </aside>

  </main>

  <!-- ── User card popup ────────────────────────────────────────────────────── -->
  <div id="usercard-popup" class="hidden" role="dialog" aria-modal="true">
    <div id="usercard-header">
      <img id="usercard-avatar" src="" alt="" />
      <div id="usercard-info">
        <span id="usercard-name"></span>
        <span id="usercard-badges"></span>
      </div>
      <button id="usercard-close">✕</button>
    </div>
    <div id="usercard-body">
      <div class="usercard-stat"><span>Seguidor desde</span><span id="uc-followed"></span></div>
      <div class="usercard-stat"><span>Sub</span><span id="uc-sub"></span></div>
      <div class="usercard-stat"><span>Mensajes (sesión)</span><span id="uc-msgs"></span></div>
    </div>
    <div id="usercard-actions">
      <button class="uc-btn" id="uc-timeout">Timeout</button>
      <button class="uc-btn danger" id="uc-ban">Ban</button>
      <button class="uc-btn safe" id="uc-unban">Desbanear</button>
    </div>
  </div>

  <!-- ── Notification toast ────────────────────────────────────────────────── -->
  <div id="toast-container" aria-live="assertive"></div>

  <script src="chat.js"></script>
</body>
</html>
